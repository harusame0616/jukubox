version: "0.2"
globRoot: .
files:
  - "**"
ignorePaths:
  - node_modules
  - .next
  - dist
  - coverage
  - .claude
  - plans
  - "**/*.tsbuildinfo"
  - "**/pnpm-lock.yaml"
  - "**/*.sum"
  - "**/go.mod"
  - skills-lock.json
  - apps/api/internal/db
  - apps/api/tmp
  - "**/*.out"
  - packages/supabase
language: en
ignoreRegExpList:
  - /[　-鿿-￯]+/g
  # Supabase ローカル開発用キー (sb_publishable_*, sb_secret_*)
  - /sb_(?:publishable|secret)_[\w-]+/g
